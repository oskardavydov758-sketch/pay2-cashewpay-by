<script>
    let date = new Date();
    let day = date.getDate();
    let month = date.getMonth() + 1;
    let year = date.getFullYear();
    let hours1 = date.getHours();
    let hours2 = hours1 + 1;
    let minutes = date.getMinutes();
 
    if (day < 10) day = `0${day}`;
    if (month < 10) month = `0${month}`;
    if (hours1 < 10) hours1 = `0${hours1}`;
    if (hours2 < 10) hours2 = `0${hours2}`;
    if (minutes < 10) minutes = `0${minutes}`;
 
    let fromDate = `${day}.${month}.${year} ${hours1}:${minutes}`;
    let toDate = `${day}.${month}.${year} ${hours2}:${minutes}`;
    let hash = Math.random().toString(36).substring(2, 12) + Math.random().toString(36).substring(2, 8);

    let garageNumber = prompt('Введите номер гаража (Garage number):');

    document.querySelector('.from').textContent = fromDate;
    document.querySelector('.to').textContent = toDate;
    document.querySelector('.hash').textContent = hash;
    document.querySelector('.garage').textContent = garageNumber;
</script>
