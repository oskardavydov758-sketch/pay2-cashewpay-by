<!DOCTYPE html>
<html lang="ru-RU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cashew Pay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Open Sans', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            color: rgba(0,0,0,0.65);
            font-size: 18px;
            line-height: 1.4;
        }
        .wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .ant-layout {
            display: flex;
            flex-direction: column;
            flex: auto;
            background: #fff;
        }
        .header {
            background: #fff;
            padding: 0;
            line-height: 58px;
            z-index: 10;
            min-width: 305px;
            box-shadow: 0 2px 8px #f0f1f2;
        }
        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 10px;
        }
        .logoOffset {
            flex: 1 1;
        }
        .logoCont {
            flex: 2 1;
            display: flex;
            justify-content: center;
            margin: 5px;
        }
        .logoCont img {
            max-width: 180px;
            height: auto;
        }
        .backCont {
            flex: 1 1;
        }
        .content-area {
            flex: 1 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafafa;
            padding: 20px;
        }
        .container-card {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }
        .form-card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 3px 9px 1px rgba(0,0,0,0.1);
            border: 1px solid #efefef;
            padding: 20px 0;
            margin: 30px 0;
        }
        .row-flex {
            display: flex;
            flex-wrap: wrap;
        }
        .col {
            flex: 0 0 100%;
            max-width: 100%;
        }
        @media (min-width: 992px) {
            .col-lg-6 {
                flex: 0 0 50%;
                max-width: 50%;
            }
        }
        .qrBlock {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 15px;
            border-right: none;
        }
        .qrBlock img {
            height: 220px;
            width: 220px;
            object-fit: contain;
            margin: 10px 0;
        }
        .infoCont {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            height: 100%;
            padding: 15px 20px 15px 30px;
        }
        .infoBlock {
            text-align: left;
            width: 100%;
        }
        .info-row {
            margin-bottom: 14px;
        }
        .info-label {
            font-size: 19px;
            font-weight: 600;
            color: rgba(0,0,0,0.75);
            margin-bottom: 4px;
        }
        .info-value {
            font-size: 18px;
            font-weight: 400;
            color: rgba(0,0,0,0.85);
            margin-bottom: 0;
            word-break: break-word;
        }
        .recipient-text {
            font-size: 18px;
            font-weight: 400;
            color: rgba(0,0,0,0.85);
            line-height: 1.4;
            margin-top: 2px;
        }
        .recipient-text .garage-number {
            font-weight: 500;
            color: #2c77bd;
        }
        .price-value {
            font-size: 22px;
            font-weight: 700;
            color: #2c77bd;
        }
        .footer {
            background: #2c77bd;
            flex: 0 0 auto;
            padding: 10px 20px;
            text-align: center;
            color: #f0f8ff;
            font-size: 14px;
        }
        .footer a {
            color: #fff;
            text-decoration: none;
        }
        @media (max-width: 991px) {
            .infoCont {
                padding: 15px 20px;
                justify-content: center;
            }
            .qrBlock {
                border-right: none;
            }
        }
        @media (max-width: 767px) {
            .form-card {
                margin: 15px 0;
            }
            .qrBlock img {
                height: 180px;
                width: 180px;
            }
            .info-label {
                font-size: 18px;
            }
            .info-value, .recipient-text {
                font-size: 17px;
            }
            .price-value {
                font-size: 20px;
            }
        }
    </style>
</head>

                                        <div class="info-value"><span class="to"></span></div>
                                    </div>
                                    
                                    <div class="info-row">
                                        <div class="info-label">Описание:</div>
                                        <div class="info-value">#<span class="hash"></span>#</div>
                                    </div>
                                    
                                    <div class="info-row">
                                        <div class="info-label">Цена:</div>
                                        <div class="info-value price-value">1.05 BYN</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div>Cashew<br><a href="mailto:info@cashew.me">info@cashew.me</a></div>
        </div>
    </div>
</div>

<script>
    (function() {
        let date = new Date();
        let day = date.getDate();
        let month = date.getMonth() + 1;
        let year = date.getFullYear();
        let hours1 = date.getHours();
        let hours2 = hours1 + 1;
        let minutes = date.getMinutes();

        if (day < 10) day = '0' + day;
        if (month < 10) month = '0' + month;
        if (hours1 < 10) hours1 = '0' + hours1;
        if (hours2 < 10) hours2 = '0' + hours2;
        if (minutes < 10) minutes = '0' + minutes;

        let fromDate = `${day}.${month}.${year} ${hours1}:${minutes}`;
        let toDate = `${day}.${month}.${year} ${hours2}:${minutes}`;
        
        let hash = Math.random().toString(36).substring(2, 10) + Math.random().toString(36).substring(2, 10);
        
        let garageNumber = prompt('Введите гос. номер автобуса:', '');
        if (!garageNumber) garageNumber = '______';

        document.querySelector('.from').textContent = fromDate;
        document.querySelector('.to').textContent = toDate;
        document.querySelector('.hash').textContent = hash;
        document.getElementById('garageSpan').textContent = garageNumber;
    })();
</script>
</body>
</html>
